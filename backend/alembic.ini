# Configuración de Alembic para el backend de Academia MEGA.
# La URL de la base de datos NO se pone aquí: env.py la lee de la variable de
# entorno DATABASE_URL (ver models.py / .env.example).

[alembic]
script_location = alembic
prepend_sys_path = .
# Formato de nombres de fichero de migración: 0001_slug.py, 0002_slug.py...
file_template = %%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
